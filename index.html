<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <div class="box">
        <img src="./FORM.jfif" width="150" height="100">
        <h1>MOMENTS TREASURED</h1>
        <p>[Your Company Number] | [Your Company Email] | [Your Company Website]</p>
    </div>
    <h1 class="center">Registration Form </h1>
    <p class="center">Please fill out this form to register.</p>
    <div class="container">
        <form action="" method="post">
            <div class="spacing">
                <label><b>Name</b></label><br><br>
                <input type="text" name="name" placeholder="enter your first name">
                <input type="text" name="name" placeholder="enter your last name"><br><br>
                <label><b>Email</b></label><br><br>
                <input type="email" name="email" placeholder="enter your email" required><br><br>
                <label><b>Phone number</b></label><br><br>
                <input type="tel" name="number" placeholder="enter your number"> <br><br>
                <label><b>Date of Birth</b></label><br><br>
                <input type="date" name="dob"><br><br>
            </div>
            <label><b>Gender</b></label><br><br>
            <input type="radio" name="gender" value="male">Male<br>
            <input type="radio" name="gender" value="female">Female<br><br>
            <label><b>Skills</b></label><br><br>
            <input type="checkbox" name="skill1" value="Python">Python<br>
            <input type="checkbox" name="skill2" value="Web Development">Web Development<br>
            <input type="checkbox" name="skill3" value="Graphic Designing">Graphic Designing<br>
            <input type="checkbox" name="skill4" value="Digital Marketing">Digital Marketing<br><br>
            <input type="submit"><br>
        </form>
    </div>
</body>

</html>
